<script>
    (function(){
      var manifest={name:"Richard Forex",short_name:"RForex",description:"Monitor de contas MT4/MT5",start_url:".",display:"standalone",background_color:"#05070a",theme_color:"#05070a",orientation:"portrait-primary",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%2305070a'/%3E%3Cpath d='M36 140 L70 96 L96 116 L136 68' stroke='%2300ffa3' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
      var blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
      var url=URL.createObjectURL(blob);
      var link=document.createElement("link");
      link.rel="manifest";link.href=url;
      document.head.appendChild(link);
    })();
    if("serviceWorker" in navigator){
      var swCode='const CACHE="rf-v2";const FILES=["/"];self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)).catch(()=>{}));});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response("Offline"))));});';
      var swBlob=new Blob([swCode],{type:"text/javascript"});
      var swUrl=URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(function(){});
    }
    </script>

</div>
<script>
    var SU="", SK="", contas=[], posicoes={}, snaps={}, activeId=null, snapPer=30, CHS={}, ticker=null, curPage="ov", hideBalances=false;
    var deferredInstall = null;

    window.onload = function() {
        const u = localStorage.getItem("rf_url"), k = localStorage.getItem("rf_key");
        if(u && k) {
            document.getElementById("iURL").value = u;
            document.getElementById("iKey").value = k;
            SU = u; SK = k;
            showApp();
        } else {
            document.getElementById("pgSetup").classList.remove('hidden');
        }
    };

    // PWA Installation Logic from SCREEN_16
    window.addEventListener("beforeinstallprompt", function(e) {
        e.preventDefault();
        deferredInstall = e;
        const b = document.getElementById("installBanner");
        if(b) b.classList.add("show");
    });

    window.addEventListener("appinstalled", function() {
        const b = document.getElementById("installBanner");
        if(b) b.classList.remove("show");
        deferredInstall = null;
        toast("Terminal Installed", "ok");
    });

    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById("installBtn");
        const dis = document.getElementById("dismissBtn");
        if(btn) btn.addEventListener("click", function() {
            if(!deferredInstall) return;
            deferredInstall.prompt();
            deferredInstall.userChoice.then(function() {
                deferredInstall = null;
                const b = document.getElementById("installBanner");
                if(b) b.classList.remove("show");
            });
        });
        if(dis) dis.addEventListener("click", function() {
            const b = document.getElementById("installBanner");
            if(b) b.classList.remove("show");
        });

        // iOS detection logic
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia("(display-mode:standalone)").matches || window.navigator.standalone;
        if(isIOS && !isStandalone) {
            const b = document.getElementById("installBanner");
            const tx = b ? b.querySelector(".ibtx span") : null;
            const ibtn = document.getElementById("installBtn");
            if(b && tx) {
                tx.textContent = 'Tap Share \u21E7 and "Add to Home Screen"';
                b.classList.add("show");
            }
            if(ibtn) ibtn.style.display = "none";
        }
    });

    function conectar() {
        const u = document.getElementById("iURL").value.trim().replace(/\/$/, "");
        const k = document.getElementById("iKey").value.trim();
        const e = document.getElementById("sErr");
        e.classList.add('hidden');

        if(u.length < 10 || k.length < 20) {
            e.textContent = "Please provide valid API credentials.";
            e.classList.remove('hidden');
            return;
        }

        SU = u; SK = k;
        localStorage.setItem("rf_url", u);
        localStorage.setItem("rf_key", k);
        showApp();
    }

    function showApp() {
        document.getElementById("pgSetup").classList.add('hidden');
        const app = document.getElementById("pgApp");
        app.classList.remove('hidden');
        app.classList.add('flex');
        goPage("ov");
        loadAll();
        if(ticker) clearInterval(ticker);
        ticker = setInterval(loadAll, 15000);
    }

    function sair() {
        localStorage.removeItem("rf_url");
        localStorage.removeItem("rf_key");
        if(ticker) clearInterval(ticker);
        location.reload();
    }

    function goPage(p) {
        curPage = p;
        document.getElementById("pgOv").classList.toggle('hidden', p !== 'ov');
        document.getElementById("pgDet").classList.toggle('hidden', p !== 'det');
        document.getElementById("tab0").classList.toggle('on', p === 'ov');
        document.getElementById("tab1").classList.toggle('on', p === 'det');
        if(p === 'det') renderDet();
    }

    function apiGet(p) { 
        return fetch(SU + "/rest/v1/" + p, { 
            headers: { "apikey": SK, "Authorization": "Bearer " + SK } 
        }).then(r => {
            if(!r.ok) throw new Error("API Error: " + r.status);
            return r.json();
        }); 
    }

    function apiPost(p, b) { 
        return fetch(SU + "/rest/v1/" + p, { 
            method: "POST", 
            headers: { "apikey": SK, "Authorization": "Bearer " + SK, "Content-Type": "application/json" }, 
            body: JSON.stringify(b) 
        }); 
    }

    function loadAll() {
        apiGet("accounts?select=*&order=name.asc").then(d => {
            if (!Array.isArray(d)) return;
            contas = d;
            if(!contas.length) return;
            if(!activeId || !contas.find(c => c.account_id === activeId)) activeId = contas[0].account_id;
            
            apiGet("positions?select=*&order=profit.desc").then(pos => {
                posicoes = {};
                if(Array.isArray(pos)) {
                    pos.forEach(p => {
                        if(!posicoes[p.account_id]) posicoes[p.account_id] = [];
                        posicoes[p.account_id].push(p);
                    });
                }
            }).then(() => {
                return Promise.all(contas.map(c => loadSnaps(c.account_id)));
            }).then(() => {
                renderOv();
                if(curPage === "det") renderDet();
                renderSel();
            });
        }).catch(err => {
            console.error("API Error:", err);
            toast("Connection Error", "err");
        });
    }

    function loadSnaps(aid) {
        const d = new Date(); d.setDate(d.getDate() - 90);
        return apiGet(`equity_snapshots?account_id=eq.${aid}&recorded_at=gte.${d.toISOString()}&order=recorded_at.asc&select=equity,balance,daily_pnl,monthly_pnl,total_pnl,recorded_at&limit=2000`)
        .then(s => snaps[aid] = s).catch(() => snaps[aid] = []);
    }

    function renderOv() {
        let tb=0, teq=0, td=0, tm=0, tt=0;
        contas.forEach(c => {
            tb += (c.balance || 0); teq += (c.equity || 0);
            td += (c.daily_pnl || 0); tm += (c.monthly_pnl || 0); tt += (c.total_pnl || 0);
        });

        document.getElementById("sBal").textContent = fmt(tb);
        document.getElementById("sEq").textContent = fmt(teq);
        document.getElementById("sCnt").textContent = contas.length;
        
        setVal("sDay", td);
        setVal("sMon", tm);
        setVal("sTot", tt);
        
        let html = "";
        const grouped = contas.reduce((acc, c) => {
            const cat = c.category || "Trading Accounts";
            if(!acc[cat]) acc[cat] = [];
            acc[cat].push(c);
            return acc;
        }, {});

        for(let cat in grouped) {
            html += `
            <div class="space-y-4 mb-8">
                <h3 class="text-[10px] font-display font-bold uppercase tracking-[0.25em] text-slate-500 flex items-center gap-3">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#00ffa3]/40"></span> ${cat}
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    ${grouped[cat].map(c => card(c)).join('')}
                </div>
            </div>`;
        }
        document.getElementById("ovGrid").innerHTML = html;
        applyHideState();
    }

    function card(c) {
        const dd = Math.abs(c.open_drawdown_pct || 0);
        const profit = c.daily_pnl || 0;
        const startBalance = (c.balance || 0) - profit;
        const pctChange = startBalance > 0 ? (profit / startBalance * 100) : 0;
        const barColor = dd > 10 ? 'bg-[#ff3b5c]' : 'bg-[#00ffa3]';
        
        return `
        <div class="glass p-7 rounded-[32px] space-y-5 cursor-pointer hover:border-[#00ffa3]/30 transition-all active:scale-[0.98] relative overflow-hidden group" onclick="goAccount('${c.account_id}')">
            <div class="absolute top-0 right-0 p-5">
                <span class="text-[9px] font-bold px-2.5 py-1 rounded-lg bg-white/5 text-slate-400 border border-white/5 uppercase tracking-wider">${c.platform}</span>
            </div>
            <div class="flex items-start justify-between">
                <div class="space-y-1">
                    <h4 class="font-display font-bold text-xl">${c.name}</h4>
                    <p class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">#${c.account_id}</p>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-sm font-bold ${profit >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b5c]'}">${profit >= 0 ? '+' : ''}${fmt(profit)}</span>
                    <span class="text-[9px] font-bold ${profit >= 0 ? 'text-[#00ffa3]/50' : 'text-[#ff3b5c]/50'} uppercase">${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}% Today</span>
                </div>
            </div>
            <div class="flex items-end justify-between pt-2">
                <div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Balance</p>
                    <p class="text-3xl font-display font-bold bal-val">${fmt(c.balance, c.currency)}</p>
                </div>
                <div class="text-right">
                    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl ${dd > 10 ? 'bg-[#ff3b5c]/10 text-[#ff3b5c]' : 'bg-[#00ffa3]/10 text-[#00ffa3]'}">
                        <span class="text-xs font-black font-mono tracking-tighter">${dd.toFixed(1)}%</span>
                    </div>
                    <p class="text-[9px] text-slate-500 mt-1.5 uppercase font-bold tracking-widest">Drawdown</p>
                </div>
            </div>
            <!-- Drawdown Bar -->
            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div class="h-full ${barColor} transition-all duration-1000 shadow-[0_0_10px_rgba(0,255,163,0.2)]" style="width: ${Math.min(dd, 100)}%"></div>
            </div>
        </div>`;
    }

    function goAccount(id) {
        activeId = id;
        loadSnaps(id).then(() => {
            goPage('det');
            renderSel();
        });
    }

    function renderDet() {
        const acc = contas.find(c => c.account_id === activeId);
        if(!acc) return;

        const pos = posicoes[activeId] || [];
        const snapsList = snaps[activeId] || [];
        const profit = acc.daily_pnl || 0;
        const startBalance = (acc.balance || 0) - profit;
        const pctChange = startBalance > 0 ? (profit / startBalance * 100) : 0;
        
        document.getElementById("detCont").innerHTML = `
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-[32px] border-l-4 border-[#00ffa3] glow-emerald">
                <p class="text-[10px] font-display font-bold text-slate-500 uppercase tracking-widest">Equity</p>
                <p class="text-2xl font-display font-bold mt-1 bal-val">${fmt(acc.equity, acc.currency)}</p>
            </div>
            <div class="glass p-6 rounded-[32px] border-l-4 ${profit >= 0 ? 'border-[#00ffa3] glow-emerald' : 'border-[#ff3b5c] glow-crimson'}">
                <p class="text-[10px] font-display font-bold text-slate-500 uppercase tracking-widest">Daily P&L</p>
                <p class="text-xl font-display font-bold mt-1 ${profit >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b5c]'}">
                    ${profit >= 0 ? '+' : ''}${fmt(profit, acc.currency)}
                    <span class="text-[11px] block opacity-70">${pctChange >= 0 ? '+' : ''}${pctChange.toFixed(2)}% Today</span>
                </p>
            </div>
        </div>

        <div class="glass p-7 rounded-[32px] space-y-6">
            <div class="flex items-center justify-between">
                <h5 class="text-[10px] font-display font-bold uppercase text-slate-500 tracking-[0.2em]">Account Growth</h5>
                <div class="flex bg-white/5 p-1 rounded-xl gap-1">
                    <button class="px-3.5 py-1.5 text-[10px] font-black rounded-lg transition-all ${snapPer==7?'bg-[#00ffa3] text-black':'text-slate-500'}" onclick="setSnapPer(7)">7D</button>
                    <button class="px-3.5 py-1.5 text-[10px] font-black rounded-lg transition-all ${snapPer==30?'bg-[#00ffa3] text-black':'text-slate-500'}" onclick="setSnapPer(30)">30D</button>
                    <button class="px-3.5 py-1.5 text-[10px] font-black rounded-lg transition-all ${snapPer==90?'bg-[#00ffa3] text-black':'text-slate-500'}" onclick="setSnapPer(90)">90D</button>
                </div>
            </div>
            <div class="h-64 w-full">
                <canvas id="chEq"></canvas>
            </div>
        </div>

        <div class="glass p-7 rounded-[32px] space-y-5">
            <div class="flex items-center justify-between">
                <h5 class="text-[10px] font-display font-bold uppercase text-slate-500 tracking-[0.2em]">Performance Hub</h5>
                <span class="text-[10px] font-black text-white/40 uppercase tracking-widest">${new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' })}</span>
            </div>
            <div class="cal-header-row grid grid-cols-7 gap-1 mb-1">
                <div class="cal-header">M</div><div class="cal-header">T</div><div class="cal-header">W</div><div class="cal-header">T</div><div class="cal-header">F</div><div class="cal-header">S</div><div class="cal-header">S</div>
            </div>
            <div class="cal-grid" id="perfCalendar"></div>
        </div>

        <!-- Execute Trade Form (from SCREEN_3) -->
        <div class="glass p-7 rounded-[32px] space-y-6">
            <h5 class="text-[10px] font-display font-bold uppercase text-slate-500 tracking-[0.2em]">Execute Trade</h5>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Symbol</label>
                    <input class="w-full bg-[#1e252f] border-white/5 rounded-2xl text-sm font-bold text-white focus:ring-[#00ffa3] p-4" id="tSym" placeholder="XAUUSD" type="text"/>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Lots</label>
                    <input class="w-full bg-[#1e252f] border-white/5 rounded-2xl text-sm font-bold text-white focus:ring-[#00ffa3] p-4" id="tLots" step="0.01" type="number" value="0.01"/>
                </div>
            </div>
            <div class="flex gap-4">
                <button class="flex-1 py-5 bg-[#00ffa3]/10 border border-[#00ffa3]/20 text-[#00ffa3] font-display font-black rounded-[24px] hover:bg-[#00ffa3]/20 active:scale-95 transition-all text-sm tracking-widest" onclick="enviarOrdem('BUY')">BUY</button>
                <button class="flex-1 py-5 bg-[#ff3b5c]/10 border border-[#ff3b5c]/20 text-[#ff3b5c] font-display font-black rounded-[24px] hover:bg-[#ff3b5c]/20 active:scale-95 transition-all text-sm tracking-widest" onclick="enviarOrdem('SELL')">SELL</button>
            </div>
        </div>

        <!-- Positions Table (from SCREEN_3) -->
        <div class="space-y-5">
            <div class="flex items-center justify-between">
                <h5 class="text-[10px] font-display font-bold uppercase text-slate-500 tracking-[0.2em]">Open Positions (${pos.length})</h5>
                ${pos.length > 0 ? `<button class="text-[10px] font-black text-[#ff3b5c] uppercase underline tracking-widest active:opacity-50" onclick="fecharTodas()">Close All</button>` : ''}
            </div>
            <div class="space-y-4">
             ${pos.map(p => `
               <div class="glass p-5 rounded-[28px] flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex flex-col items-center justify-center font-bold text-xs uppercase text-slate-400 border border-white/5">
                        <span class="${p.type=='BUY'?'text-[#00ffa3]':'text-[#ff3b5c]'} text-[8px]">${p.type}</span>
                        <span>${p.symbol.substring(0,3)}</span>
                    </div>
                    <div>
                        <p class="text-sm font-bold">${p.symbol} <span class="text-[10px] font-mono opacity-50 ml-1">x${p.lots.toFixed(2)}</span></p>
                        <p class="text-[10px] text-slate-500 font-medium tracking-tight">Open: @${p.open_price}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-lg font-display font-black ${p.profit >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b5c]'}">${p.profit >= 0 ? '+' : ''}${p.profit.toFixed(2)}</p>
                    <button class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1 hover:text-[#ff3b5c] transition-colors" onclick="fechaPos(${p.ticket}, this)">Close Trade</button>
                </div>
               </div>
             `).join('')}
             ${pos.length === 0 ? '<div class="text-center py-12 glass rounded-[32px] text-slate-500 text-xs font-bold uppercase tracking-widest border-dashed border-white/5">No active positions</div>' : ''}
            </div>
        </div>`;
      
        setTimeout(() => {
            buildChart(acc, snapsList);
            buildCalendar(acc, snapsList);
        }, 100);
        applyHideState();
    }

    function buildCalendar(acc, data) {
        const grid = document.getElementById('perfCalendar');
        if(!grid) return;
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        let startOffset = firstDay.getDay() - 1;
        if (startOffset === -1) startOffset = 6;
        
        const dayData = {};
        data.forEach(s => {
            const d = new Date(s.recorded_at);
            if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) {
                const key = d.getDate();
                if(!dayData[key]) dayData[key] = { pnl: 0, balance: s.balance, minEq: s.equity };
                dayData[key].pnl = s.daily_pnl || 0;
                dayData[key].minEq = Math.min(dayData[key].minEq, s.equity);
            }
        });

        let html = "";
        for(let i=0; i<startOffset; i++) html += `<div class="cal-day opacity-20"></div>`;
        for(let d=1; d<=lastDay.getDate(); d++) {
            const stats = dayData[d];
            const hasData = !!stats;
            let pnlColor = "text-slate-500/30";
            let pnlVal = "—";
            
            if(hasData) {
                pnlVal = (stats.pnl >= 0 ? "+" : "") + stats.pnl.toFixed(0);
                pnlColor = stats.pnl >= 0 ? "text-[#00ffa3]" : "text-[#ff3b5c]";
            }

            html += `
            <div class="cal-day ${hasData && stats.pnl > 0 ? 'bg-[#00ffa3]/5' : (hasData && stats.pnl < 0 ? 'bg-[#ff3b5c]/5' : '')}">
                <span class="text-[8px] font-black text-slate-500/40">${d}</span>
                <div class="text-center pb-1">
                    <span class="text-[9px] font-black ${pnlColor}">${pnlVal}</span>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    function buildChart(acc, data) {
        const ctx = document.getElementById('chEq');
        if(!ctx) return;
        if(CHS.main) CHS.main.destroy();
        const filtered = data.slice(-snapPer);
        CHS.main = new Chart(ctx, {
            type: 'line',
            data: {
                labels: filtered.map(s => new Date(s.recorded_at).toLocaleDateString()),
                datasets: [{
                    data: filtered.map(s => s.equity),
                    borderColor: '#00ffa3',
                    borderWidth: 2.5,
                    fill: true,
                    backgroundColor: (context) => {
                        const chart = context.chart;
                        const {ctx, chartArea} = chart;
                        if (!chartArea) return null;
                        const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                        gradient.addColorStop(0, 'rgba(0, 255, 163, 0)');
                        gradient.addColorStop(1, 'rgba(0, 255, 163, 0.08)');
                        return gradient;
                    },
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false }, tooltip: { enabled: true } }, 
                scales: { 
                    x: { display: false }, 
                    y: { grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, border: { display: false }, ticks: { color: '#64748b', font: { size: 9, weight: 'bold' }, padding: 8 } } 
                } 
            }
        });
    }

    function setSnapPer(n) { 
        snapPer = n; 
        renderDet(); 
    }

    function toggleHide() {
        hideBalances = !hideBalances;
        applyHideState();
    }

    function applyHideState() {
        document.querySelectorAll('.bal-val').forEach(el => el.classList.toggle('hidden-val', hideBalances));
    }

    function fmt(n, cur = "USD") {
        return new Intl.NumberFormat("en-US", { style: "currency", currency: cur }).format(n || 0);
    }

    function setVal(id, v) {
        const el = document.getElementById(id);
        if(!el) return;
        el.textContent = (v >= 0 ? "+" : "") + fmt(v);
        el.className = `text-lg font-display font-bold ${v >= 0 ? 'text-[#00ffa3]' : 'text-[#ff3b5c]'}`;
    }

    function renderSel() {
        const sel = document.getElementById("accSel");
        if(!sel) return;
        sel.innerHTML = contas.map(c => `<option ${c.account_id === activeId ? 'selected' : ''} value="${c.account_id}">${c.name} (${c.platform})</option>`).join('');
    }

    function trocarConta() {
        activeId = document.getElementById("accSel").value;
        loadSnaps(activeId).then(() => renderDet());
    }

    function toast(msg, type) {
        const el = document.getElementById("toast");
        if(!el) return;
        el.textContent = msg;
        el.style.opacity = "1";
        el.classList.toggle('text-[#00ffa3]', type === 'ok');
        el.classList.toggle('text-[#ff3b5c]', type === 'err');
        setTimeout(() => el.style.opacity = "0", 3000);
    }

    function enviarOrdem(tipo) {
        const sym = document.getElementById("tSym").value.toUpperCase();
        const lots = parseFloat(document.getElementById("tLots").value);
        if(!sym || isNaN(lots)) return toast("Check input values", "err");
        
        apiPost("commands", { 
            account_id: activeId, 
            action: "open", 
            symbol: sym, 
            type: tipo, 
            lots: lots 
        }).then(() => {
            toast(`${tipo} order sent for ${sym}`, "ok");
            setTimeout(loadAll, 1000);
        });
    }

    function fechaPos(ticket, btn) {
        btn.disabled = true;
        btn.textContent = "...";
        apiPost("commands", { account_id: activeId, action: "close_ticket", ticket: ticket })
            .then(() => { 
                toast("Closing position...", "ok"); 
                setTimeout(loadAll, 2000); 
            }).catch(() => {
                btn.disabled = false;
                btn.textContent = "Close Trade";
                toast("Error closing", "err");
            });
    }

    function fecharTodas() {
        if(!confirm("Are you sure? This will close all active positions for this account.")) return;
        apiPost("commands", { account_id: activeId, action: "close_all" })
            .then(() => { 
                toast("Wiping portfolio...", "ok"); 
                setTimeout(loadAll, 2000); 
            });
    }
</script>
</body></html>
